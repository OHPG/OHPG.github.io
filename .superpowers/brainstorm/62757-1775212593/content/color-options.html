<h2>移动端配色方案</h2>
<p class="subtitle">是否沿用 PC 端的视觉风格</p>

<div class="options">
  <div class="option" data-choice="d1" onclick="toggleSelect(this)">
    <div class="letter">D1</div>
    <div class="content">
      <h3>保持一致</h3>
      <p>深色背景 + 青色/绿色渐变，完全沿用 PC 端视觉风格</p>
    </div>
  </div>

  <div class="option" data-choice="d2" onclick="toggleSelect(this)">
    <div class="letter">D2</div>
    <div class="content">
      <h3>更简洁</h3>
      <p>保持深色但减少渐变面积，用纯色按钮和边框替代</p>
    </div>
  </div>

  <div class="option" data-choice="d3" onclick="toggleSelect(this)">
    <div class="letter">D3</div>
    <div class="content">
      <h3>提高对比度</h3>
      <p>深色背景 + 提高文字对比度，改善移动端阅读体验</p>
    </div>
  </div>
</div>

<div class="mockup" style="margin-top: 1.5rem;">
  <div class="mockup-header">D1 配色示意</div>
  <div class="mockup-body">
    <div style="border: 1px solid #333; padding: 12px; background: #000;">
      <div style="font-size: 20px; font-weight: bold; background: linear-gradient(90deg, #3bf4fb, #32ffa5); -webkit-background-clip: text; color: transparent; margin-bottom: 8px;">OHPG</div>
      <div style="height: 60px; background: linear-gradient(180deg, #111 0%, #000 100%); border-radius: 6px; margin-bottom: 8px;"></div>
      <div style="display: flex; gap: 6px;">
        <div style="flex: 1; height: 32px; background: linear-gradient(90deg, #3bf4fb, #32ffa5); border-radius: 6px;"></div>
        <div style="flex: 1; height: 32px; background: #222; border-radius: 6px;"></div>
      </div>
    </div>
  </div>
</div>
