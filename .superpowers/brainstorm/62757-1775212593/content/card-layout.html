<h2>项目卡片内容布局</h2>
<p class="subtitle">每个项目的展示信息如何呈现</p>

<div class="options">
  <div class="option" data-choice="c1" onclick="toggleSelect(this)">
    <div class="letter">C1</div>
    <div class="content">
      <h3>完整信息卡片</h3>
      <p>项目名 + 截图预览 + 特性列表 + 标签 + GitHub 链接，全部垂直堆叠</p>
    </div>
  </div>

  <div class="option" data-choice="c2" onclick="toggleSelect(this)">
    <div class="letter">C2</div>
    <div class="content">
      <h3>截图优先</h3>
      <p>截图大图占主要空间，特性列表精简或折叠显示</p>
    </div>
  </div>

  <div class="option" data-choice="c3" onclick="toggleSelect(this)">
    <div class="letter">C3</div>
    <div class="content">
      <h3>列表式</h3>
      <p>截图缩小在左，文字信息在右，类似列表项横排</p>
    </div>
  </div>
</div>
