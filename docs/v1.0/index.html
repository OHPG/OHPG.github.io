<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OHPG - 创新技术 · 优质体验</title>
    <!-- 引入字体和图标 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <!-- AOS 动画库 -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        /* ==================== CSS 变量定义 ==================== */
        :root {
            /* 色彩系统 */
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-tertiary: #1e293b;
            --accent-cyan: #3bf4fb;
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --accent-gradient: linear-gradient(135deg, #3bf4fb 0%, #a855f7 50%, #ec4899 100%);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-glow: rgba(59, 244, 251, 0.3);
            --border-subtle: rgba(255, 255, 255, 0.08);

            /* 间距系统 */
            --space-xs: 8px;
            --space-sm: 16px;
            --space-md: 24px;
            --space-lg: 32px;
            --space-xl: 48px;
            --space-2xl: 64px;
            --space-3xl: 96px;

            /* 容器宽度 */
            --container-max: 1200px;

            /* 动画时长 */
            --duration-fast: 200ms;
            --duration-normal: 400ms;
            --duration-slow: 600ms;

            /* 缓动函数 */
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* ==================== 全局重置样式 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        .container {
            max-width: var(--container-max);
            margin: 0 auto;
            padding: 0 var(--space-md);
        }

        /* ==================== 页面骨架占位符 ==================== */
        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: var(--space-sm) 0;
            background: rgba(10, 14, 23, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-subtle);
            transition: background var(--duration-fast) ease;
        }

        .navbar-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: var(--space-lg);
        }

        .nav-links a {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: color var(--duration-fast) ease;
        }

        .nav-links a:hover {
            color: var(--accent-cyan);
        }

        .github-link {
            display: flex;
            align-items: center;
            font-size: 1.5rem;
            color: var(--text-secondary);
            transition: color var(--duration-fast) ease;
        }

        .github-link:hover {
            color: var(--accent-cyan);
        }

        /* Hamburger 按钮 */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }

        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--text-primary);
            transition: transform var(--duration-fast) ease, opacity var(--duration-fast) ease;
        }

        .hamburger.active span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        /* 移动端菜单 */
        .mobile-menu {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 999;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--duration-normal) ease, visibility var(--duration-normal) ease;
        }

        .mobile-menu.active {
            opacity: 1;
            visibility: visible;
        }

        .mobile-nav-links {
            list-style: none;
            text-align: center;
        }

        .mobile-nav-links li {
            margin: var(--space-md) 0;
        }

        .mobile-nav-links a {
            font-size: 1.5rem;
            font-weight: 600;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .nav-links,
            .github-link {
                display: none;
            }

            .hamburger {
                display: flex;
            }
        }

        /* Hero 区域 */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            padding: var(--space-3xl) var(--space-md);
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero-title {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.1;
            margin-bottom: var(--space-md);
        }

        .title-main {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: clamp(1.25rem, 3vw, 1.75rem);
            color: var(--text-secondary);
            margin-bottom: var(--space-sm);
        }

        .hero-subtitle .separator {
            margin: 0 var(--space-xs);
            opacity: 0.5;
        }

        .hero-desc {
            font-size: 1rem;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        /* 滚动指示器 */
        .scroll-indicator {
            position: absolute;
            bottom: var(--space-xl);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-xs);
            color: var(--text-secondary);
            font-size: 0.875rem;
            opacity: 0.6;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(8px); }
        }

        /* 项目卡片区域 */
        .projects-grid {
            /* 占位 - 待实现 */
        }

        /* 项目详情区域 */
        .project-details {
            /* 占位 - 待实现 */
        }

        /* Footer */
        .footer {
            /* 占位 - 待实现 */
        }

        /* 粒子背景 Canvas */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <!-- 移动端菜单 Overlay -->
    <div class="mobile-menu">
        <ul class="mobile-nav-links">
            <li><a href="#FinVideo">FinVideo</a></li>
            <li><a href="#FinMusic">FinMusic</a></li>
            <li><a href="#FinBook">FinBook</a></li>
            <li><a href="#FinAdmin">FinAdmin</a></li>
            <li><a href="https://github.com/OHPG" target="_blank">GitHub</a></li>
        </ul>
    </div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container navbar-inner">
            <a href="#" class="logo">OHPG</a>
            <ul class="nav-links">
                <li><a href="#FinVideo">FinVideo</a></li>
                <li><a href="#FinMusic">FinMusic</a></li>
                <li><a href="#FinBook">FinBook</a></li>
                <li><a href="#FinAdmin">FinAdmin</a></li>
            </ul>
            <a href="https://github.com/OHPG" target="_blank" class="github-link">
                <i class="ri-github-fill"></i>
            </a>
            <button class="hamburger" aria-label="菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Hero 区域 -->
    <header class="hero">
        <div class="hero-content container">
            <h1 class="hero-title" data-aos="fade-up">
                <span class="title-main">OHPG</span>
            </h1>
            <p class="hero-subtitle" data-aos="fade-up" data-aos-delay="100">
                创新技术 <span class="separator">·</span> 优质体验
            </p>
            <p class="hero-desc" data-aos="fade-up" data-aos-delay="200">
                四个 HarmonyOS 应用，与 Jellyfin 完美配合
            </p>
        </div>
        <div class="scroll-indicator" data-aos="fade-up" data-aos-delay="400">
            <span>向下滚动</span>
            <i class="ri-arrow-down-line"></i>
        </div>
    </header>

    <!-- 项目卡片区域 -->
    <section class="projects-grid">
        <!-- 占位 - 待实现 -->
    </section>

    <!-- 项目详情区域 -->
    <section class="project-details">
        <!-- 占位 - 待实现 -->
    </section>

    <!-- Footer -->
    <footer class="footer">
        <!-- 占位 - 待实现 -->
    </footer>

    <!-- 粒子背景 Canvas -->
    <canvas id="particleCanvas"></canvas>

    <!-- AOS 脚本 -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <!-- 导航栏交互 -->
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const hamburger = document.querySelector('.hamburger');
        const mobileMenu = document.querySelector('.mobile-menu');
        const mobileNavLinks = document.querySelectorAll('.mobile-nav-links a');

        if (hamburger && mobileMenu) {
            // Hamburger 切换
            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                mobileMenu.classList.toggle('active');
                document.body.style.overflow = mobileMenu.classList.contains('active') ? 'hidden' : '';
            });

            // 点击链接关闭菜单
            mobileNavLinks.forEach(link => {
                link.addEventListener('click', () => {
                    hamburger.classList.remove('active');
                    mobileMenu.classList.remove('active');
                    document.body.style.overflow = '';
                });
            });
        }
    });
    </script>
</body>
</html>
